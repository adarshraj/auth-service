quarkus:
  application:
    name: auth-service
  datasource:
    # Default: SQLite (zero operational overhead, no separate process). Works in production too.
    # To use PostgreSQL instead: set QUARKUS_DATASOURCE_DB_KIND=postgresql,
    # QUARKUS_DATASOURCE_JDBC_URL, QUARKUS_DATASOURCE_USERNAME, QUARKUS_DATASOURCE_PASSWORD.
    # No rebuild required — both drivers are already on the classpath.
    db-kind: other
    jdbc:
      driver: org.sqlite.JDBC
      url: ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:${AUTH_DB_FILE:./authservice.db}}
  hibernate-orm:
    dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    migrate-at-start: true
  http:
    port: 8703
    cors:
      enabled: true
      # No wildcard default — must be set explicitly in production via AUTH_CORS_ORIGINS
      origins: "${AUTH_CORS_ORIGINS:}"
      # Rate limiting reads X-Forwarded-For (rightmost entry) for the real client IP.
      # Ensure your reverse proxy (nginx/caddy/traefik) sets this header and strips
      # any client-supplied X-Forwarded-For values before forwarding to this service.
      methods: GET,POST,DELETE,OPTIONS,HEAD,PUT,PATCH
      headers: accept,authorization,content-type,x-app-id,x-admin-key
      access-control-max-age: 24H
  otel:
    enabled: true

auth:
  jwt:
    # Access token expiry in seconds. Default 15 minutes (short-lived; use refresh tokens for longevity).
    expiry-seconds: ${AUTH_JWT_EXPIRY_SECONDS:900}
  refresh-token:
    # Refresh token expiry in seconds. Default 7 days.
    expiry-seconds: ${AUTH_REFRESH_TOKEN_EXPIRY_SECONDS:604800}
  admin-key: ${AUTH_ADMIN_KEY:}
  # HMAC-SHA256 secrets — three separate secrets to limit blast radius if one leaks.
  # auth.key-hmac-secret  → admin key comparison (ApiKeyHasher)
  # auth.state-hmac-secret → OAuth state signing  (AuthResource)
  # auth.token-pepper      → auth token / oauth code storage hashing (UserService, AuthResource)
  key-hmac-secret: ${AUTH_KEY_HMAC_SECRET:dev-only-insecure-hmac-secret-change-in-prod}
  state-hmac-secret: ${AUTH_STATE_HMAC_SECRET:dev-only-insecure-state-secret-change-in-prod}
  token-pepper: ${AUTH_TOKEN_PEPPER:dev-only-insecure-token-pepper-change-in-prod}
  rate-limit:
    enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${AUTH_RATE_LIMIT_RPM:60}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
  # Base URL used to build OAuth callback URLs and token links.
  base-url: ${AUTH_BASE_URL:http://localhost:8703}
  session:
    # Cookie domain for platform_session cookie (e.g. ".homelab.local" for *.homelab.local).
    # Leave empty for localhost/dev (cookie scoped to auth-service origin only).
    cookie-domain: ${AUTH_SESSION_COOKIE_DOMAIN:}

"%dev":
  quarkus:
    datasource:
      jdbc:
        url: ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:${AUTH_DB_FILE:./authservice-dev.db}}

"%test":
  quarkus:
    datasource:
      jdbc:
        url: jdbc:sqlite:file:authservice-test?mode=memory&cache=shared
    log:
      level: INFO
    otel:
      enabled: false
  auth:
    admin-key: test-admin-key
    state-hmac-secret: "test-state-hmac-secret-32-chars!!"
    token-pepper: "test-token-pepper-exactly-32chars!!"
    key-hmac-secret: "test-hmac-secret-exactly-32-chars!!"
    session:
      cookie-domain: "localhost"
    rate-limit:
      enabled: false

"%prod":
  quarkus:
    smallrye-openapi:
      enable: false

# No %prod datasource override — SQLite works fine for personal use in production.
# To use PostgreSQL in prod, set these env vars at runtime (no rebuild needed):
#   QUARKUS_DATASOURCE_DB_KIND=postgresql
#   QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://host:5432/authservice
#   QUARKUS_DATASOURCE_USERNAME=authservice
#   QUARKUS_DATASOURCE_PASSWORD=...
#   QUARKUS_HIBERNATE_ORM_DIALECT=org.hibernate.dialect.PostgreSQLDialect
